<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(29,43,83,0.15)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo (inline SVG from pikoci) -->
  <g transform="translate(500,80) scale(1.8)">
    <polygon points="50,3 93,27.5 93,72.5 50,97 7,72.5 7,27.5" fill="#29ADFF" stroke="#FFEC27" stroke-width="3.5"/>
    <path d="M50,23 A27,27 0 1,1 26,64" fill="none" stroke="#FFF1E8" stroke-width="7" stroke-linecap="round"/>
    <polygon points="17,56 26,76 40,62" fill="#FFF1E8"/>
    <circle cx="50" cy="50" r="7" fill="#FFEC27"/>
  </g>
  <!-- Text -->
  <text x="600" y="380" font-family="sans-serif" font-weight="800" font-size="72" fill="#FFF1E8" text-anchor="middle">PikoCI</text>
  <text x="600" y="440" font-family="sans-serif" font-weight="500" font-size="28" fill="#C2C3C7" text-anchor="middle">The CI/CD that grows with you.</text>
  <text x="600" y="500" font-family="monospace" font-weight="500" font-size="18" fill="#29ADFF" text-anchor="middle">One binary. Any database. Any queue. Runs anywhere.</text>
  <!-- Bottom accent line -->
  <rect x="400" y="550" width="400" height="3" rx="1.5" fill="#29ADFF" opacity="0.5"/>
</svg>
